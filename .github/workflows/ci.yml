name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install
        run: bun install --frozen-lockfile

      # Gate on high+ so dev-only moderate advisories don't block merges;
      # highs in the tree (shipped or not) must be bumped away.
      - name: Audit dependencies
        run: bun audit --audit-level=high

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build

      - name: CLI smoke test
        run: |
          cd examples/motor-controller
          node ../../packages/nerve-cli/bin/nerve.js validate ./src/main.harness.ts
          node ../../packages/nerve-cli/bin/nerve.js export ./src/main.harness.ts --out /tmp/packet
          test -f /tmp/packet/manufacturing-packet.pdf

  # Tests the PUBLISHED tarball shape, not the source workspace — the test
  # class that would have caught the three consecutive broken releases
  # (src-pointing exports, phantom dep pins, missing dist).
  tarball-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Pack, install, and exercise tarballs
        run: bun scripts/smoke-tarballs.ts

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install
        run: bun install --frozen-lockfile

      - name: Install Playwright chromium
        run: cd packages/nerve-web && bunx playwright install --with-deps chromium

      - name: Build web app
        run: cd packages/nerve-web && bun run build

      - name: Bundle check
        run: bun scripts/check-web-bundle.ts

      - name: E2E + a11y (Playwright + axe)
        run: cd packages/nerve-web && bun run e2e

  # Deploys to Vercel on main. Green-skips while VERCEL_TOKEN is unset:
  # the guard step flips `skip` and every later step no-ops.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci, tarball-smoke, e2e]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_12KWBEUhkMyQ7SoMeW388x0l
      VERCEL_PROJECT_ID: prj_XApqLq8ttK6hV92HqqedWP0ndmK4
    steps:
      - name: Check for Vercel token
        id: guard
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN secret not set — skipping deploy"
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-node@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 24

      - name: Install
        if: steps.guard.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Build web app
        if: steps.guard.outputs.skip != 'true'
        run: cd packages/nerve-web && bun run build

      - name: Bundle check
        if: steps.guard.outputs.skip != 'true'
        run: bun scripts/check-web-bundle.ts

      - name: Deploy to Vercel
        if: steps.guard.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          bunx vercel build --prod --token=$VERCEL_TOKEN
          bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
