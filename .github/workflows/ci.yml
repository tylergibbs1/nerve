name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build

      - name: CLI smoke test
        run: |
          cd examples/motor-controller
          node ../../packages/nerve-cli/bin/nerve.js validate ./src/main.harness.ts
          node ../../packages/nerve-cli/bin/nerve.js export ./src/main.harness.ts --out /tmp/packet
          test -f /tmp/packet/manufacturing-packet.pdf
